<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar"> 
             <div class="logo">
                <h1>Dashboard</h1>
            </div>
            <div class="sidebar-items">
                <div class="top">
                    <div class="link">
                        <p>Home</p>
                    </div>
                    <div class="link">
                        <p>Profile</p>
                    </div>
                    <div class="link">
                        <p>Messages</p>
                    </div>
                    <div class="link">
                        <p>History</p>
                    </div>
                    <div class="link">
                        <p>Tasks</p>
                    </div>
                    <div class="link">
                        <p>Communities</p>
                    </div>
                </div>
                <div class="bottom">
                    <div class="link">
                        <p>Settings</p>
                    </div>
                    <div class="link">
                        <p>Support</p>
                    </div>
                    <div class="link">
                        <p>Privacy</p>
                    </div>
                </div>
            </div>
            <div class="side-content">
            </div>
        </div>
        <div class="header">
            <p>Header</p>

        </div>

        <div class="nav">
            <div class="left">
                <div class="profile"></div>
                <div class="greeting">
                    <p>Hi there,</p>
                    <p>Morgan Oakley (@morgan)</p>
                </div>
            </div>
            <div class="right">
                <button>New</button>
                <button>Upload</button>
                <button>Share</button>
            </div>
        </div>

        <div class="content">
           
            <div class="cards">
                <p class="project-header">Your Projects</p>
                <div class="card">
                    <p class="title">Title</p>
                    <p class="Description">Description</p>
                </div>
                 <div class="card">
                    <p class="title">Title</p>
                    <p class="Description">Description</p>
                </div>
                 <div class="card">
                    <p class="title">Title</p>
                    <p class="Description">Description</p>
                </div>
                 <div class="card">
                    <p class="title">Title</p>
                    <p class="Description">Description</p>
                </div>
                 <div class="card">
                    <p class="title">Title</p>
                    <p class="Description">Description</p>
                </div>
                 <div class="card">
                    <p class="title">Title</p>
                    <p class="Description">Description</p>
                </div>
            </div>
            <div class="right-info">
                <div class="announcement">
                    <p class="info-header">Announcements</p>
                    <div class="info-card"></div>
                </div>
                <div class="trend">
                    <p class="info-header">Trending</p>
                    <div class="info-card"></div>
                </div>
            </div>
      
        </div>
    </div>
</body>
</html>
